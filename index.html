<!DOCTYPE html>

<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>До нишевой поездки в Гуанчжоу</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    font-family:-apple-system,BlinkMacSystemFont,sans-serif;

    height:100vh;

    overflow:hidden;

    background:url('background.png') center center/cover no-repeat;

}

.overlay{

    position:fixed;

    inset:0;

    background:rgba(0,0,0,.55);

    display:flex;

    align-items:center;

    justify-content:center;

    padding:20px;

}

.card{

    width:100%;

    max-width:420px;

    text-align:center;

    color:white;

}

h1{

    font-size:30px;

    margin-bottom:30px;

}

#countdown{

    font-size:42px;

    font-weight:700;

    line-height:1.2;

}

.subtitle{

    margin-top:12px;

    font-size:18px;

    opacity:.9;

}

.progress-wrapper{

    margin-top:35px;

}

.progress{

    width:100%;

    height:18px;

    background:rgba(255,255,255,.2);

    border-radius:999px;

    overflow:hidden;

}

.progress-bar{

    height:100%;

    width:0%;

    background:linear-gradient(90deg,#f5d76e,#ffd700);

    transition:width .5s;

}

.percent{

    margin-top:10px;

    font-size:18px;

}

.flight{

    margin-top:35px;

    font-size:18px;

    line-height:1.6;

}

</style>

</head>

<body>

<div class="overlay">

    <div class="card">

        <h1>🇨🇳 До нишевой поездки в Гуанчжоу</h1>

        <div id="countdown">Загрузка...</div>

        <div class="subtitle">

            до вылета

        </div>

        <div class="progress-wrapper">

            <div class="progress">

                <div class="progress-bar" id="bar"></div>

            </div>

            <div class="percent" id="percent"></div>

        </div>

        <div class="flight">

            ✈️ Вылет<br>

            12 августа 2026<br>

            14:25

        </div>

    </div>

</div>

<script>

const startDate = new Date('2026-06-19T13:00:00');

const endDate = new Date('2026-08-12T14:25:00');

function updateCountdown(){

    const now = new Date();

    const diff = endDate - now;

    if(diff <= 0){

        document.getElementById('countdown').innerHTML =

        '🎉 Мы уже в Гуанчжоу!';

        document.getElementById('bar').style.width = '100%';

        document.getElementById('percent').innerText = '100%';

        return;

    }

    const days = Math.floor(diff/(1000*60*60*24));

    const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));

    const minutes = Math.floor((diff%(1000*60*60))/(1000*60));

    document.getElementById('countdown').innerHTML =

        ${days} дней<br>${hours} часов<br>${minutes} минут;

    const total = endDate - startDate;

    const passed = now - startDate;

    let percent = (passed / total) * 100;

    if(percent < 0) percent = 0;

    if(percent > 100) percent = 100;

    document.getElementById('bar').style.width =

        percent + '%';

    document.getElementById('percent').innerText =

        percent.toFixed(1) + '% пути пройдено';

}

updateCountdown();

setInterval(updateCountdown, 60000);60000);

</script>

</body>

</html>
